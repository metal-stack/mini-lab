---
dhcp_listening_interfaces:
  - Vlan4000

metal_core_cidr_mask: 25
metal_core_spine_uplinks:
  - Ethernet8

sonic_config_docker_routing_config_mode: split-unified
sonic_config_frr_render: false

sonic_config_loopback_address: "{{ lo }}"
sonic_config_mgmt_interface:
  ip: "{{ ansible_host }}/16`"
  gateway_address: "172.42.0.1"

sonic_config_mgmt_vrf: false
sonic_config_nameservers: "{{ router_nameservers }}"

sonic_config_vlans:
  - id: 4000
    ip: "{{ metal_core_cidr }}"
    dhcp_servers:
      - "{{ lo }}"
    dhcp_relay_link_select: "enable" # not wired up in metal-roles/sonic-configdb-utils
    dhcp_relay_src_intf: "Loopback0" # not wired up in metal-roles/sonic-configdb-utils

sonic_config_vtep:
  enabled: true

sonic_config_ntp:
  servers:
    - 0.europe.pool.ntp.org
    - 1.europe.pool.ntp.org
    - 2.europe.pool.ntp.org
    - 3.europe.pool.ntp.org

sonic_config_features:
  dhcp_relay:
    enabled: true
    auto_restart: true

# TODO: config dhcpv4_relay add --source-interface Loopback0 --link-selection enable --dhcpv4-servers 10.0.1.1 Vlan4000