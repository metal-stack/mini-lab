name: mini-lab
prefix: ""

mgmt:
  network: mini_lab_internal

topology:
  defaults:
    kind: linux
  nodes:
    exit:
      image: quay.io/frrouting/frr:10.3.0
      network-mode: none
      binds:
        - files/exit/daemons:/etc/frr/daemons
        - files/exit/frr.conf:/etc/frr/frr.conf
        - files/exit/vtysh.conf:/etc/frr/vtysh.conf
        - files/exit/network.sh:/root/network.sh
      exec:
        - sh /root/network.sh
    external_service:
      image: docker.io/library/nginx:alpine-slim
      network-mode: none
      binds:
        - files/external_service/network.sh:/root/network.sh
      exec:
        - sh /root/network.sh
    mini_lab_ext:
      kind: bridge
    managementserver:
      kind: generic_vm
      image: vrnetlab/canonical_ubuntu:jammy
      cpu: 1
      memory: 512Mb
      env:
        QEMU_MEMORY: 512
    kea:
      kind: linux
      network-mode: container:exit # join the network namespace of inet
      image: docker.cloudsmith.io/isc/docker/kea-dhcp4:2.6.0
      binds:
        - files/kea.json:/etc/kea/kea-dhcp4.conf
    leaf01:
      group: leaves
      image: ${MINI_LAB_SONIC_IMAGE}
      binds:
        - files/ssh/id_ed25519.pub:/authorized_keys
      env:
        QEMU_MEMORY: 4096
    leaf02:
      group: leaves
      image: ${MINI_LAB_SONIC_IMAGE}
      binds:
        - files/ssh/id_ed25519.pub:/authorized_keys
      env:
        QEMU_MEMORY: 4096
    machine01:
      group: machines
      image: ${MINI_LAB_VM_IMAGE}
      env:
        UUID: 00000000-0000-0000-0000-000000000001
    machine02:
      group: machines
      image: ${MINI_LAB_VM_IMAGE}
      env:
        UUID: 00000000-0000-0000-0000-000000000002
  links:
    - endpoints: ["exit:mini_lab_ext", "mini_lab_ext:exit"]
      mtu: 9000
    - endpoints: ["external_service:mini_lab_ext", "mini_lab_ext:external_service"]
      mtu: 9000
    - endpoints: ["leaf01:Ethernet0", "machine01:lan0"]
    - endpoints: ["leaf02:Ethernet0", "machine01:lan1"]
    - endpoints: ["leaf01:Ethernet4", "machine02:lan0"]
    - endpoints: ["leaf02:Ethernet4", "machine02:lan1"]
    - endpoints: ["leaf01:Ethernet8", "exit:eth1"]
    - endpoints: ["leaf02:Ethernet8", "exit:eth2"]
